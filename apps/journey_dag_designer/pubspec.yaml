name: journey_dag_designer
description: >-
  Journey DAG Designer — Flutter (Web-primary) control-plane authoring tool for
  the IDFC integration platform. Authors journeys as DAGs; never executes them.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # The shared DAG core (models, serializer, canvas, network) — also used by
  # the read-only journey_ops_view app.
  dag_core:
    path: ../../packages/dag_core

  # State / DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.5.0

  # Models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # YAML preview
  yaml_writer: ^2.0.0

  # Auth storage
  flutter_secure_storage: ^9.2.2

  # Misc
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Codegen
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

  # Lints / mocks
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
